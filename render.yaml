services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: expense-manager-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-manager-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ML_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: https://expense-manager-frontend.onrender.com  # update after frontend deploys

  # ── Frontend (static site) ────────────────────────────────────────────────────
  - type: web
    name: expense-manager-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://expense-manager-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: expense-manager-db
    databaseName: expense_manager
    plan: free
