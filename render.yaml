services:
  - type: web
    name: ledgerly
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:migrate && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      # Set this to your Neon pooled connection string in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
